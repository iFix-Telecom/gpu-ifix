# Ifix AI Gateway — Portainer stack template (Docker Swarm).
#
# Deploy target: Portainer stack `ai-gateway-dev` / `ai-gateway-prod`
# managed at portainer3.ifixtelecom.com.br.
#
# Target host runs Docker Swarm; this file uses the Compose v3.x schema
# with the `deploy:` section (Swarm-native) instead of `restart:` /
# `container_name:` (Compose-only). Env vars come from the Portainer
# stack UI — this file uses ${VAR} interpolation ONLY.
#
# Network model:
#   - `worker_intra` is the shared overlay network where Traefik discovers
#     services (--providers.docker.network=worker_intra) and where the
#     stack's Postgres/Redis live. Mark it `external: true` because
#     Portainer doesn't recreate shared overlay networks on stack deploy.
#
# TLS / public exposure:
#   - Traefik labels publish ${GATEWAY_DOMAIN} via websecure (443) with
#     letsencryptresolver. Set GATEWAY_DOMAIN to e.g. ai-gateway-dev.ifixtelecom.com.br
#     and create a DNS A/AAAA record pointing at the worker host before deploy.
#
# Schema migrations: the gateway binary runs goose.Up on boot when
# AI_GATEWAY_MIGRATE_ON_BOOT=true (CONTEXT.md D-D1). Flip to false after
# the first successful deploy to save ~100ms of startup and avoid drift
# during rolling restarts.

services:
  gateway:
    image: ghcr.io/ifixtelecom/ifix-ai-gateway:${TAG:-latest-dev}
    environment:
      TZ: America/Sao_Paulo
      GATEWAY_PORT: 8080
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Data layer (shared DO Postgres + shared in-cluster Redis)
      AI_GATEWAY_PG_DSN: ${AI_GATEWAY_PG_DSN}
      AI_GATEWAY_PG_MAX_CONNS: ${AI_GATEWAY_PG_MAX_CONNS:-10}
      AI_GATEWAY_REDIS_ADDR: ${AI_GATEWAY_REDIS_ADDR}
      AI_GATEWAY_REDIS_PASSWORD: ${AI_GATEWAY_REDIS_PASSWORD:-}
      AI_GATEWAY_REDIS_DB: ${AI_GATEWAY_REDIS_DB:-0}
      # Upstreams (Phase 1 pod)
      UPSTREAM_LLM_URL: ${UPSTREAM_LLM_URL}
      UPSTREAM_STT_URL: ${UPSTREAM_STT_URL}
      UPSTREAM_EMBED_URL: ${UPSTREAM_EMBED_URL}
      UPSTREAM_HEALTH_BRIDGE_URL: ${UPSTREAM_HEALTH_BRIDGE_URL}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Bootstrap
      BOOTSTRAP_TENANT_SLUG: ${BOOTSTRAP_TENANT_SLUG:-converseai}
      # Boot-time migrations (flip off after first prod deploy)
      AI_GATEWAY_MIGRATE_ON_BOOT: ${AI_GATEWAY_MIGRATE_ON_BOOT:-true}
    networks:
      - worker_intra
    healthcheck:
      # /gateway --self-check is a free syscall-ish check; /health needs
      # DB + Redis reachable which is validated on first real request.
      test: ["CMD", "/gateway", "--self-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
        window: 60s
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ai_gateway.rule=Host(`${GATEWAY_DOMAIN}`)"
        - "traefik.http.routers.ai_gateway.entrypoints=websecure"
        - "traefik.http.routers.ai_gateway.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.ai_gateway.loadbalancer.server.port=8080"
        - "traefik.http.services.ai_gateway.loadbalancer.passHostHeader=true"

  # ifix-ai-dashboard — the Next.js 15 operator observability dashboard
  # (Phase 7). Standalone Better Auth + a server-side proxy to the gateway's
  # /admin API; deployed in the same Portainer stack, single GitHub webhook.
  #
  # All five env vars are SERVER-SIDE ONLY (no NEXT_PUBLIC_ prefix) — see
  # dashboard/.env.example. GATEWAY_BASE_URL points at the gateway service on
  # the shared `worker_intra` overlay (e.g. http://gateway:8080).
  # DASHBOARD_DATABASE_URL is the dashboard's OWN Postgres schema/db, isolated
  # from the gateway's ai_gateway schema (RESEARCH.md Pitfall 7).
  dashboard:
    image: ghcr.io/ifixtelecom/ifix-ai-dashboard:${DASHBOARD_TAG:-develop}
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      PORT: 3001
      # Better Auth (standalone instance)
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      DASHBOARD_DATABASE_URL: ${DASHBOARD_DATABASE_URL}
      # Server-side gateway proxy
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-http://gateway:8080}
      GATEWAY_ADMIN_KEY: ${GATEWAY_ADMIN_KEY}
    networks:
      - worker_intra
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
        window: 60s
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ai_dashboard.rule=Host(`${DASHBOARD_DOMAIN}`)"
        - "traefik.http.routers.ai_dashboard.entrypoints=websecure"
        - "traefik.http.routers.ai_dashboard.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.ai_dashboard.loadbalancer.server.port=3001"
        - "traefik.http.services.ai_dashboard.loadbalancer.passHostHeader=true"

networks:
  worker_intra:
    external: true
