version: "2"
sql:
  - engine: postgresql
    queries:
      - db/queries/upstreams.sql
      - db/queries/audit.sql
      - db/queries/auth.sql
      - db/queries/admin.sql
      - db/queries/model_aliases.sql
      - db/queries/billing.sql
      - db/queries/usage_counters.sql
      - db/queries/prices.sql
      - db/queries/fx_rates.sql
      - db/queries/tenants_admin.sql
      - db/queries/admin_keys.sql
      - db/queries/emergency_lifecycles.sql
      - db/queries/primary_lifecycles.sql
    schema: db/migrations
    gen:
      go:
        package: gen
        out: internal/db/gen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
          - db_type: timestamptz
            go_type: time.Time
