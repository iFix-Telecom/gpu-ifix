# Phase 6.6 Strategy α — build converseai-primary-pod image.
#
# Builds the multi-stage image (pod/primary/Dockerfile) bundling
# supervisord + 4 upstream service binaries (llama.cpp b9191, speaches,
# infinity, dcgm-exporter) and pushes to
# ghcr.io/ifixtelecom/converseai-primary-pod.
#
# Image bump policy: any bump to one of the 4 upstream SHA-pinned FROM
# stages in pod/primary/Dockerfile requires a follow-up WAVE0-GATES.md
# amendment + operator sign-off (06.6-WAVE0-GATES.md Decision 1
# "Image bump policy" + operator's last paragraph in that doc).
#
# Triggers:
#   - push to `develop` filtered to pod/primary/** + this workflow file
#   - push to `v*` tags (semver releases)
#   - manual workflow_dispatch
#
# Tag strategy (mirrors build-gateway.yml + .github/workflows/build-pod.yml):
#   - `dev-{sha}` on develop branch push
#   - `develop` floating tag on develop branch push
#   - `v{major}.{minor}.{patch}` on semver tag push
#   - `{major}.{minor}` on semver tag push
#
# See pod/primary/Dockerfile for build details.

name: build-primary-pod

on:
  push:
    branches: [develop]
    tags: ['v*']
    paths:
      - 'pod/primary/**'
      - '.github/workflows/build-primary-pod.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push primary pod image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ifixtelecom/converseai-primary-pod
          tags: |
            type=ref,event=branch,prefix=dev-,suffix=-{{sha}}
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: pod/primary/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=converseai-primary-pod
          cache-to: type=gha,scope=converseai-primary-pod,mode=max
