# pod/docker-compose.yml
# 4-service GPU inference pod for Vast.ai RTX 3090.
# Launched by pod/onstart.sh (plan 05) after weights downloaded from MinIO (D-02).
# Image tagged/pushed by .github/workflows/build-pod.yml (plan 07).
#
# Phase 11.2 (2026-06-07): STT RE-ADDED to pod as tier-0 local-stt (Speaches +
# faster-whisper-large-v3) after Phase 11.1 D-A4 revert. Cascade tier-1 in the
# gateway = gemini-stt -> groq-whisper -> openai-whisper.
# Phase 11.1 (2026-06-04, now reverted): STT was briefly removed from pod —
# tier-0 local-stt restored by Phase 11.2 to drop pod-ON STT cost to $0/req.
#
# Refs:
#   - .planning/phases/01-gpu-pod-image-smoke-test/01-03-PLAN.md
#   - .planning/phases/01-gpu-pod-image-smoke-test/01-CONTEXT.md D-07/D-08/D-10/D-11/D-24/D-25/D-26/D-27
#   - .planning/phases/01-gpu-pod-image-smoke-test/01-PATTERNS.md §pod/docker-compose.yml

name: ifix-ai-pod

x-common-env: &common-env
  TZ: America/Sao_Paulo
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

x-gpu-all: &gpu-all
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # -----------------------------------------------------------------------
  # llama: Qwen 3.5 27B Q4_K_M via llama-server CUDA binary (D-07, D-24)
  # Flags locked: -np 2, --ctx-size 16384, --jinja, --chat-template-file (D-08, POD-06)
  # -----------------------------------------------------------------------
  llama:
    image: ${IFIX_AI_POD_IMAGE:-ghcr.io/ifixtelecom/ifix-ai-pod:latest}
    container_name: ifix-ai-pod-llama
    environment:
      <<: *common-env
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /weights/qwen/model.gguf
      -np 2
      --ctx-size 16384
      --jinja
      --chat-template-file /app/templates/qwen3.5-27b-tool-calling.jinja
      --log-format json
    volumes:
      - ${WEIGHTS_DIR:-/weights}:/weights:ro
    ports:
      - "8000:8000"
    networks:
      - ifix-ai-pod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/health > /dev/null || python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    <<: *gpu-all
    stop_grace_period: 30s

  # -----------------------------------------------------------------------
  # speaches: Whisper large-v3 OpenAI-compat STT (D-25; Phase 11.2 D-B1 LOCKED)
  # Image pin: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda-12.6.3 — Phase
  # 06.7/06.8 UAT-validated. HF_HUB_CACHE=/weights/whisper workaround per
  # Phase 06.8 fix-iii (Pitfall 4 in 11.2-RESEARCH).
  # -----------------------------------------------------------------------
  speaches:
    image: ${PRIMARY_SPEACHES_IMAGE:-ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda-12.6.3}
    container_name: ifix-ai-pod-speaches
    environment:
      <<: *common-env
      WHISPER_MODEL: Systran/faster-whisper-large-v3
      WHISPER_MODEL_PATH: /weights/whisper
      HF_HUB_CACHE: /weights/whisper
    volumes:
      - ${WEIGHTS_DIR:-/weights}/whisper:/weights/whisper:rw
    ports:
      - "8001:8000"
    networks:
      - ifix-ai-pod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/health > /dev/null || python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    <<: *gpu-all
    stop_grace_period: 30s

  # -----------------------------------------------------------------------
  # health-bridge: aggregated health probes on port 9100 (D-10..D-13)
  # Built from pod/health-bridge/Dockerfile (plan 04). Phase 11.2: probe set
  # restored to {LLM, STT} after 11.1 revert.
  # -----------------------------------------------------------------------
  health-bridge:
    image: ${IFIX_AI_POD_HEALTH_BRIDGE_IMAGE:-ghcr.io/ifixtelecom/ifix-ai-pod-health-bridge:latest}
    container_name: ifix-ai-pod-health-bridge
    environment:
      <<: *common-env
      HEALTH_BRIDGE_PORT: "9100"
      LLAMA_URL: "http://llama:8000"
      SPEACHES_URL: "http://speaches:8000"
      SPEACHES_MODEL: "${SPEACHES_MODEL:-Systran/faster-whisper-large-v3}"
      PROBE_INTERVAL_SECONDS: "10"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ENV: "${ENV:-production}"
    ports:
      - "9100:9100"
    networks:
      - ifix-ai-pod
    depends_on:
      - llama
      - speaches
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/health-bridge", "--self-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 10s

  # -----------------------------------------------------------------------
  # dcgm-exporter: GPU metrics on port 9400 (POD-04, D-27)
  # -----------------------------------------------------------------------
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest-ubuntu22.04
    container_name: ifix-ai-pod-dcgm-exporter
    environment:
      <<: *common-env
      DCGM_EXPORTER_LISTEN: ":9400"
      DCGM_EXPORTER_KUBERNETES: "false"
    ports:
      - "9400:9400"
    networks:
      - ifix-ai-pod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9400/metrics > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *gpu-all
    cap_add:
      - SYS_ADMIN

networks:
  ifix-ai-pod:
    driver: bridge
    name: ifix-ai-pod
